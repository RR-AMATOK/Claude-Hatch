name: CI

on:
  push:
    branches: [main, beta, dev, 'feature/*', 'fix/*', 'hotfix/*']
  pull_request:
    branches: [main, beta, dev]
  workflow_dispatch:

# Cancel prior in-flight runs for the same branch/PR so a fresh push
# short-circuits the previous one instead of queueing.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: CI only needs to read the repo. Tightens blast radius if a
# dependency is ever compromised.
permissions:
  contents: read

jobs:
  test:
    name: test (node ${{ matrix.node }} · ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      # Report every matrix failure, don't cancel siblings on first red.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: ['20.x', '22.x']
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install deps (frozen lockfile)
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Demo-GIF safety lint
        run: npm run demo:lint

  pack:
    name: pack dry-run (tarball hygiene)
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22.x'
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Dry-run pack + hygiene assertions
        run: |
          set -euo pipefail
          output=$(npm pack --dry-run 2>&1)
          echo "$output"
          # Test files must never ship.
          if echo "$output" | grep -qE '\.test\.[jt]s'; then
            echo "::error::test files leaked into tarball"
            exit 1
          fi
          # Dev-state scratch must never ship.
          if echo "$output" | grep -qE '\.dev-state'; then
            echo "::error::.dev-state leaked into tarball"
            exit 1
          fi
          # Source maps must never ship (we don't emit them, but guard anyway).
          if echo "$output" | grep -qE '\.map\b'; then
            echo "::error::source maps leaked into tarball"
            exit 1
          fi
          # LICENSE must ship.
          if ! echo "$output" | grep -q 'LICENSE'; then
            echo "::error::LICENSE missing from tarball"
            exit 1
          fi
