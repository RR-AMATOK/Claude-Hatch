# ============================================================
# Publish to npm (single trusted-publisher entry point)
# ============================================================
# Trigger: tag push matching one of three patterns; routes to the
#          corresponding npm dist-tag.
#
#   vX.Y.Z          → @latest
#   vX.Y.Z-rc.N     → @next
#   vX.Y.Z-beta.N   → @beta
#
# Auth: OIDC trusted publisher.
#   workflow filename: publish.yml
#   environment:       publish (placeholder, no protection rules)
#
# npm only allows ONE trusted publisher per package — that's why all
# three flows funnel through this single workflow file. See DEC-022.
#
# IMPORTANT: renaming this file or the `publish` environment must be
# mirrored in the npm trusted-publisher registration in lock-step, or
# OIDC publish will 403.
#
# Concurrency: cancel-in-progress: false — a half-finished publish is
# worse than a queued one.
# ============================================================

name: Publish

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'              # stable: @latest
      - 'v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+'    # release candidate: @next
      - 'v[0-9]+.[0-9]+.[0-9]+-beta.[0-9]+'  # beta: @beta

# Default to minimal read. id-token: write is scoped to the publish job
# only (the gate job has no business minting an OIDC token).
permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  gate:
    name: pre-publish gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node 22.x
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.x'
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm run demo:lint
      - run: npm test
      - run: npm run build

      - name: Verify tag exactly matches package.json version
        run: |
          set -euo pipefail
          pkg_version=$(node -p "require('./package.json').version")
          tag_ref="${GITHUB_REF#refs/tags/v}"
          # Exact match required: pre-release suffixes (-rc.N, -beta.N) MUST
          # be reflected in package.json so npm publishes the correct version.
          # The previous "strip suffix and compare bare" logic let pre-release
          # tags publish the bare version, which silently overwrote @latest.
          if [ "$pkg_version" != "$tag_ref" ]; then
            echo "::error::tag v$tag_ref does not match package.json version $pkg_version"
            echo "::error::for pre-releases, bump package.json to the full pre-release version (e.g. 0.1.1-beta.0) before tagging"
            exit 1
          fi
          echo "tag v$tag_ref ↔ package.json $pkg_version  OK"

  publish:
    name: npm publish
    needs: gate
    runs-on: ubuntu-latest
    # `publish` environment is a placeholder with no protection rules. It
    # exists to satisfy npm trusted-publisher registration which requires a
    # non-empty environment field. Per DEC-022, all flows publish without
    # manual approval — CI gate is the only gate.
    environment: publish
    timeout-minutes: 10
    permissions:
      contents: read
      # id-token: write scoped to publish only — required for npm OIDC.
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # NOTE: `registry-url` intentionally OMITTED below.
      #
      # Setting registry-url makes setup-node write an .npmrc containing
      # `_authToken=${NODE_AUTH_TOKEN}` AND export a placeholder NODE_AUTH_TOKEN
      # to the job env. npm then uses the placeholder as a real auth token,
      # 404s at the registry, and never falls through to OIDC trusted publisher.
      # We saw this end-to-end on every prior 404 (see PR history #41/#42/#43).
      # By omitting registry-url, no .npmrc is created, no NODE_AUTH_TOKEN is
      # injected, and npm 11.5.1+ detects OIDC env vars and uses trusted-
      # publisher auth cleanly. Default registry (npmjs.org) is used.
      - name: Setup Node 22.x
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.x'
          cache: npm

      # Node 22.x ships with npm 10.x. npm 11.5.1 added full OIDC trusted-
      # publisher integration. `sudo` avoids the self-upgrade race where the
      # in-flight npm process partially overwrites its own files mid-install
      # (PR #41 hit MODULE_NOT_FOUND `promise-retry`).
      - name: Upgrade npm for OIDC trusted publishing (>= 11.5.1)
        run: |
          sudo npm install --global npm@latest
          echo "npm version after upgrade: $(npm --version)"

      - run: npm ci
      - run: npm run build

      - name: Determine dist-tag from ref
        id: dist
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF" == *-beta.* ]]; then
            tag=beta
          elif [[ "$GITHUB_REF" == *-rc.* ]]; then
            tag=next
          else
            tag=latest
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "publishing $GITHUB_REF to npm dist-tag: $tag"

      - name: Publish with provenance
        # OIDC auth via npm trusted publisher (workflow=publish.yml, env=publish).
        # See DEC-022 and docs/ci-cd.md §6.
        #
        # No NODE_AUTH_TOKEN clear needed because we don't pass registry-url
        # to setup-node anymore — see the comment block before setup-node above.
        #
        # --ignore-scripts: skip prepublishOnly (which re-runs `npm test`) and
        # prepack (which rebuilds dist). The gate above already ran tests and
        # `npm run build` already happened in this job (PR #37).
        run: npm publish --provenance --access public --ignore-scripts --tag "${{ steps.dist.outputs.tag }}"
