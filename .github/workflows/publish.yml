# ============================================================
# Publish to npm (single trusted-publisher entry point)
# ============================================================
# Trigger: tag push matching one of three patterns; routes to the
#          corresponding npm dist-tag.
#
#   vX.Y.Z          → @latest
#   vX.Y.Z-rc.N     → @next
#   vX.Y.Z-beta.N   → @beta
#
# Auth: OIDC trusted publisher.
#   workflow filename: publish.yml
#   environment:       publish (placeholder, no protection rules)
#
# npm only allows ONE trusted publisher per package — that's why all
# three flows funnel through this single workflow file. See DEC-022.
#
# IMPORTANT: renaming this file or the `publish` environment must be
# mirrored in the npm trusted-publisher registration in lock-step, or
# OIDC publish will 403.
#
# Concurrency: cancel-in-progress: false — a half-finished publish is
# worse than a queued one.
# ============================================================

name: Publish

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'              # stable: @latest
      - 'v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+'    # release candidate: @next
      - 'v[0-9]+.[0-9]+.[0-9]+-beta.[0-9]+'  # beta: @beta
  # Permanent escape hatch: manually trigger a publish for any tag that
  # already exists in the repo (e.g. to retry a failed publish or to
  # publish a tag that was created outside the normal bump-driven flow).
  # The gate's tag-must-match-package.json check is SKIPPED for dispatches
  # (the caller is explicitly choosing which tag to publish).
  workflow_dispatch:
    inputs:
      tag:
        description: >
          Existing tag to publish (e.g. "v1.0.0"). The tag must already
          exist in the repo — this trigger does not create tags.
        required: true
        type: string

# Default to minimal read. id-token: write is scoped to the publish job
# only (the gate job has no business minting an OIDC token).
permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  gate:
    name: pre-publish gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      # For workflow_dispatch, check out the specific tag the caller named.
      # For tag-push, the ref is already correct — no special handling needed.
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.tag) || '' }}

      - name: Verify dispatch tag exists in repo
        if: github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail
          input_tag="${{ github.event.inputs.tag }}"
          if ! git ls-remote --tags origin "refs/tags/$input_tag" | grep -q "$input_tag"; then
            echo "::error::tag '$input_tag' does not exist in the repo — create it first (e.g. via release.yml) before dispatching publish"
            exit 1
          fi
          echo "tag '$input_tag' verified present in repo"

      - name: Setup Node 22.x
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.x'
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm run demo:lint
      - run: npm test
      - run: npm run build

      - name: Verify tag exactly matches package.json version
        # Skipped for workflow_dispatch: the caller is explicitly choosing which
        # tag to publish (e.g. to retry a failed publish). The tag was already
        # validated at creation time by release.yml.
        if: github.event_name != 'workflow_dispatch'
        run: |
          set -euo pipefail
          pkg_version=$(node -p "require('./package.json').version")
          tag_ref="${GITHUB_REF#refs/tags/v}"
          # Exact match required: pre-release suffixes (-rc.N, -beta.N) MUST
          # be reflected in package.json so npm publishes the correct version.
          # The previous "strip suffix and compare bare" logic let pre-release
          # tags publish the bare version, which silently overwrote @latest.
          if [ "$pkg_version" != "$tag_ref" ]; then
            echo "::error::tag v$tag_ref does not match package.json version $pkg_version"
            echo "::error::for pre-releases, bump package.json to the full pre-release version (e.g. 0.1.1-beta.0) before tagging"
            exit 1
          fi
          echo "tag v$tag_ref ↔ package.json $pkg_version  OK"

  publish:
    name: npm publish
    needs: gate
    runs-on: ubuntu-latest
    # `publish` environment is a placeholder with no protection rules. It
    # exists to satisfy npm trusted-publisher registration which requires a
    # non-empty environment field. Per DEC-022, all flows publish without
    # manual approval — CI gate is the only gate.
    environment: publish
    timeout-minutes: 10
    permissions:
      contents: read
      # id-token: write scoped to publish only — required for npm OIDC.
      id-token: write
    steps:
      # For workflow_dispatch, check out the tag. For tag-push the ref is correct.
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.tag) || '' }}

      - name: Setup Node 22.x
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.x'
          # registry-url is required for npm ≥11.5.1 OIDC routing.
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Determine dist-tag from ref
        id: dist
        run: |
          set -euo pipefail
          # For workflow_dispatch, derive the ref from the input tag.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            effective_ref="refs/tags/${{ github.event.inputs.tag }}"
          else
            effective_ref="$GITHUB_REF"
          fi
          if [[ "$effective_ref" == *-beta.* ]]; then
            tag=beta
          elif [[ "$effective_ref" == *-rc.* ]]; then
            tag=next
          else
            tag=latest
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "publishing $effective_ref to npm dist-tag: $tag"

      - name: Publish with provenance
        # OIDC auth via npm trusted publisher (workflow=publish.yml, env=publish).
        # No NODE_AUTH_TOKEN — see DEC-022 and docs/ci-cd.md §6.
        #
        # --ignore-scripts: skip prepublishOnly (which re-runs `npm test`) and
        # prepack (which rebuilds dist). The gate job above already ran tests
        # and `npm run build` already happened in this job. Re-running here is
        # redundant and doubles the flake exposure surface — see PR #36 (TODO).
        run: npm publish --provenance --access public --ignore-scripts --tag "${{ steps.dist.outputs.tag }}"
