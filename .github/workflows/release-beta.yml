# ============================================================
# Release — beta channel
# ============================================================
# Trigger: tag push matching v*.*.*-beta.* only
# Jobs:    gate → publish
# Auth:    OIDC trusted publisher (no NODE_AUTH_TOKEN)
# Env:     release-beta (no manual approval — beta is opt-in)
#
# IMPORTANT: The npm trusted-publisher entry for this repository
# must register the workflow filename "release-beta.yml" exactly.
# If this file is renamed, update the npm trusted-publisher config
# in lock-step or the OIDC publish step will 403.
#
# Actions are pinned to commit SHA per §5.5 of docs/ci-cd.md.
# Concurrency: cancel-in-progress: false — a half-finished publish
# is worse than a queued one.
#
# Required-status-check names emitted by this file:
#   (none — tag workflows are not checked by branch protection)
# ============================================================

name: Release (beta)

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+-beta.[0-9]+'

# id-token: write is scoped to the publish job only (not gate).
# The gate job has no business minting an OIDC token.
permissions:
  contents: read

concurrency:
  group: release-beta-${{ github.ref }}
  cancel-in-progress: false

jobs:
  gate:
    name: pre-publish gate (beta)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Explicitly no id-token permission here — gate does not publish.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node 22.x
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.x'
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm run demo:lint
      - run: npm test
      - run: npm run build

      - name: Verify tag matches package.json version
        run: |
          set -euo pipefail
          pkg_version=$(node -p "require('./package.json').version")
          tag_ref="${GITHUB_REF#refs/tags/v}"
          # Strip pre-release suffix before comparison (v0.2.0-beta.1 → 0.2.0).
          tag_version="${tag_ref%%-*}"
          if [ "$pkg_version" != "$tag_version" ]; then
            echo "::error::tag v$tag_ref does not match package.json version $pkg_version"
            exit 1
          fi
          echo "tag v$tag_ref ↔ package.json $pkg_version  OK"

  publish:
    name: npm publish (beta)
    needs: gate
    runs-on: ubuntu-latest
    # environment: release-beta — no manual approval; beta is opt-in by definition.
    # Add a "Required reviewers" rule to this environment in GitHub Settings
    # if a human gate is ever desired.
    environment: release-beta
    timeout-minutes: 10
    permissions:
      contents: read
      # id-token: write scoped to publish only — required for npm OIDC trusted publishing.
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node 22.x
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.x'
          # registry-url is required for npm ≥11.5.1 OIDC routing.
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Publish beta with provenance
        # OIDC auth via npm trusted publisher — no NODE_AUTH_TOKEN.
        # See docs/ci-cd.md §6 for the verification ritual.
        run: npm publish --provenance --access public --tag beta
