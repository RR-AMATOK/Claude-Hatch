name: Release

# Triggered by semantic-version tags (v1.2.3). Manual tag push is the
# deliberate release ritual; no branch-based auto-publish.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'           # stable: @latest
      - 'v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+' # release candidate: @next
      # NOTE: v*-beta.* is handled by release-beta.yml (separate OIDC registration).

# Default to minimal read. id-token: write is scoped to the publish job only
# (the gate job has no business minting an OIDC token — see §10 of docs/ci-cd.md).
permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  gate:
    name: pre-publish gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Explicitly no id-token permission here — gate does not publish.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.x'
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm run demo:lint
      - run: npm test
      - run: npm run build

      - name: Verify tag matches package.json version
        run: |
          set -euo pipefail
          pkg_version=$(node -p "require('./package.json').version")
          tag_ref="${GITHUB_REF#refs/tags/v}"
          # Strip any pre-release suffix before the compare (v0.1.0-rc.1 → 0.1.0).
          tag_version="${tag_ref%%-*}"
          if [ "$pkg_version" != "$tag_version" ]; then
            echo "::error::tag v$tag_ref does not match package.json version $pkg_version"
            exit 1
          fi
          echo "tag v$tag_ref ↔ package.json $pkg_version  OK"

  publish:
    name: npm publish
    needs: gate
    runs-on: ubuntu-latest
    # Users can attach a manual approval by creating a "release" environment
    # in repo settings → Environments → Protection rules.
    environment: release
    timeout-minutes: 10
    permissions:
      contents: read
      # id-token: write scoped to publish only — required for npm OIDC trusted publishing.
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.x'
          # registry-url is required for npm ≥11.5.1 OIDC routing.
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Publish with provenance
        # OIDC auth via npm trusted publisher — no NODE_AUTH_TOKEN.
        # See docs/ci-cd.md §6 for the verification ritual.
        run: npm publish --provenance --access public
